<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Cat Sandbox</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Canvas for Gradient Animation -->
    <canvas id="gradient-canvas"></canvas>

    <!-- SCENE 1: The Menu Screen -->
    <div id="scene-1" class="scene-container">
        <div class="glass-box">
            <h2>Welcome!</h2>
            <p>Enter your name to meet our cute cat friend:</p>
            <input type="text" id="username-input" placeholder="Your Name..." autocomplete="off">
            <button id="confirm-btn">Let's Go! ✨</button>
        </div>
    </div>

    <!-- SCENE 2: The Sandbox with Cat -->
    <div id="scene-2" class="scene-container hidden">
                <!-- Counter Bars at Top -->
        <div class="counter-bars">
            <div class="counter-bar">
                <span class="counter-label">Pet Count:</span>
                <span class="counter-value" id="pet-count">0</span>
            </div>
            <div class="counter-bar">
                <span class="counter-label">Feed Count:</span>
                <span class="counter-value" id="feed-count">0</span>
            </div>
        </div>

        <!-- Main Scene Layout -->
        <div class="scene2-layout">
            <div class="cat-container">
                <img id="cat-sprite" src="assets/cat1/cat1.png" alt="Cute Cat">
            </div>
            <div class="pixel-box" id="dialogue-text">
                Hello! 🐾
            </div>
            <button class="feed-btn">Feed Me 🍖</button>

            <div class="cat-selector-container">
                <div class="cat-dropdown hidden" id="cat-dropdown">
                    <div class="dropdown-item" data-cat="orange">
                        <img src="assets/cat1/cat1.png" alt="Orange Cat"> Orange Cat
                    </div>
                    <div class="dropdown-item" data-cat="witch">
                        <img src="assets/witchcat/cat2.png" alt="Witch Cat"> Witch Cat
                    </div>
                    <div class="dropdown-item" data-cat="frost">
                        <img src="assets/frostcat/cat3.png" alt="Frosty Cat"> Frosty Cat
                    </div>
                    <div class="dropdown-item" data-cat="Japanese">
                        <img src="assets/Japanesecat/cat4.png" alt="Japanese Cat"> Japanese Cat
                    </div>
                    <div class="dropdown-item" data-cat="Golden">
                        <img src="assets/Goldencat/cat5.png" alt="Golden Cat"> Golden Cat
                    </div>
                </div>
                <button id="select-cat-btn">Choose</button>
            </div>
        </div>


    <!-- Load External JavaScript Files -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>
    <script src="js/scene1.js"></script>
    <script src="js/scene2.js"></script>
    <script src="js/cat.js"></script>
    <footer id= "footer">
        <p >&copy; 2026 Soham Bomble. All rights reserved.</p>
    </footer>
</body>
</html>
