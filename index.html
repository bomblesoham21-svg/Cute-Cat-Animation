<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Cat Sandbox</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&display=swap" rel="stylesheet">
    
    <!-- Vercel Speed Insights -->
    <script type="module">
        import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@1/dist/index.mjs';
        injectSpeedInsights();
    </script>
</head>
<body>
    <!-- Background Canvas for Gradient Animation -->
    <canvas id="gradient-canvas"></canvas>

    <!-- SCENE 1: The Menu Screen -->
    <div id="scene-1" class="scene-container">
        <div class="glass-box">
            <h2>Welcome!</h2>
            <p>Enter your name to meet our cute cat friend:</p>
            <input type="text" id="username-input" placeholder="Your Name..." autocomplete="off">
            <button id="confirm-btn">Let's Go! ✨</button>
        </div>
    </div>

    <!-- SCENE 2: The Sandbox with Cat -->
    <div id="scene-2" class="scene-container hidden">
        <div class="counter-bars">
            <div class="counter-bar">
                <span class="counter-label">Pet Count:</span>
                <span class="counter-value" id="pet-count">0</span>
            </div>
            <div class="counter-bar">
                <span class="counter-label">Feed Count:</span>
                <span class="counter-value" id="feed-count">0</span>
            </div>
        </div>

        <div class="scene2-layout">
            <div class="cat-container">
                <img id="cat-sprite" src="assets/cat1/cat1.png" alt="Cute Cat">
            </div>
            <div class="pixel-box" id="dialogue-text">
                Hello! 🐾
            </div>
            <button class="feed-btn">Feed Me 🍖</button>

            <div class="cat-selector-container">
                <div class="cat-dropdown hidden" id="cat-dropdown">
                    <div class="dropdown-item" data-cat="orange">
                        <img src="assets/cat1/cat1.png" alt="Orange Cat"> Orange Cat
                    </div>
                    <div class="dropdown-item" data-cat="witch">
                        <img src="assets/witchcat/cat2.png" alt="Witch Cat"> Witch Cat
                    </div>
                    <div class="dropdown-item" data-cat="frost">
                        <img src="assets/frostcat/cat3.png" alt="Frosty Cat"> Frosty Cat
                    </div>
                    <div class="dropdown-item" data-cat="Japanese">
                        <img src="assets/Japanesecat/cat4.png" alt="Japanese Cat"> Japanese Cat
                    </div>
                    <div class="dropdown-item" data-cat="Golden">
                        <img src="assets/Goldencat/cat5.png" alt="Golden Cat"> Golden Cat
                    </div>
                </div>
                <button id="select-cat-btn">Choose</button>
            </div>
        </div>

        <button id="open-chat-btn" class="chat-trigger-btn">Chat with Cat 💬</button>

        <div id="chat-overlay" class="chat-overlay-container hidden">
            <div class="chat-bg-grain"></div>

            <div class="chat-layout-wrapper">
                <div class="chat-active-display">
                    <img id="chat-active-cat-sprite" src="assets/cat1/cat1.png" alt="Active Chat Cat">
                </div>

                <div class="glass-chat-card-outer">
                    <button id="close-chat-btn" class="chat-exit-btn">✕ Exit Chat</button>
                    <div class="glass-chat-card-inner">
                        <div id="chat-messages-box" class="chat-message-viewport">
                            <div class="ai-bubble system-bubble">AI Neural link established. Say something! 🐾</div>
                        </div>

                        <div class="chat-input-row">
                            <div class="input-wrapper-pixel">
                                <input type="text" id="chat-text-input" placeholder="Whisper something to the cat..." autocomplete="off">
                            </div>
                            
                            <div class="chat-control-deck">
                                <button id="chat-mic-btn" class="circle-btn mic-btn" title="Voice Input">
                                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                                    <span class="mic-pulse-ring"></span>
                                </button>
                                <button id="chat-send-btn" class="circle-btn send-btn" title="Send Message">
                                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>

    <script src="js/scene1.js"></script>
    <script src="js/scene2.js"></script>

    <!-- Cat AI Knowledge -->
    <script src="js/catdictionary.js"></script>

    <!-- Cat Personalities -->
    <script src="js/catpersonalities.js"></script>

    <!-- Local AI Brain -->
    <script src="js/catbrain.js"></script>

    <!-- Chat System (must be loaded last) -->
    <script src="js/catchat.js"></script>
    <footer id="footer">
        <p>&copy; 2026 Soham Bomble. All rights reserved.</p>
    </footer>
</body>
</html>
