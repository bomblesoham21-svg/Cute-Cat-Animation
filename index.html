<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <canvas id="gradient-canvas"></canvas>

    <main id="scene-1" class="scene-container">
        <div class="glass-box">
            <h2>Welcome</h2>
            <p>Please enter your name to begin:</p>
            <input type="text" id="username-input" placeholder="Your name..." autocomplete="off">
            <button id="confirm-btn">Confirm</button>
        </div>
    </main>

    <main id="scene-2" class="scene-container hidden">
        <div class="scene2-layout">
            <div id="dialogue-box" class="pixel-box">
                <p id="dialogue-text">...</p>
            </div>

            <div class="cat-container">
                <img id="cat-sprite" src="assets/cat1.png" alt="Kitten">
            </div>
            <button class="feed-btn">Feed</button>
        </div>
    </main>


    <script src="js/scene1.js"></script>
    <script src="js/scene2.js"></script>
    <script src="js/cat.js"></script>
</body>
</html>
